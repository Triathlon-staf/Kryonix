<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STORE | KRYONIX</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Space Grotesk', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: { dark: { bg: '#060a10', card: '#0c1220', border: '#152035' }, accent: { green: '#00e89d', cyan: '#00c4ff' } }
        }
      }
    }
  </script>

  <style>
    :root { --bg: #060a10; --fg: #e8ecf2; --green: #00e89d; --border: #152035; }
    body { background: var(--bg); color: var(--fg); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
    .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,232,157,0.03) 1px, transparent 1px), linear-gradient(90deg,rgba(0,232,157,0.03) 1px, transparent 1px); background-size: 50px 50px; z-index: 0; pointer-events: none; }
    
    .product-card { 
      background: rgba(12, 18, 32, 0.7); border: 1px solid var(--border); 
      border-radius: 20px; overflow: hidden; transition: all 0.3s; position: relative;
    }
    .product-card:hover { transform: translateY(-5px); border-color: var(--green); box-shadow: 0 10px 40px -10px rgba(0, 232, 157, 0.2); }
    .product-image { width: 100%; height: 200px; object-fit: cover; background: #1a1f2e; }
    
    .btn-buy {
      width: 100%; padding: 12px; background: linear-gradient(135deg, var(--green), #00c4a0); 
      color: #060a10; font-weight: 700; border: none; border-radius: 12px; transition: 0.3s; cursor: pointer;
    }
    .btn-buy:hover { box-shadow: 0 0 20px rgba(0,232,157,0.4); }
    .btn-buy:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
    
    .filter-btn { transition: 0.3s; cursor: pointer; }
    .filter-btn.active { background: var(--green); color: #060a10; border-color: var(--green); }

    .order-modal-backdrop { background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); }

    .toast {
      position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem;
      border-radius: 12px; font-size: 0.9rem; font-weight: 600;
      z-index: 9999; transform: translateY(120px); opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #065f46; color: #6ee7b7; border: 1px solid #10b981; }
    .toast.error { background: #7f1d1d; color: #fca5a5; border: 1px solid #ef4444; }

    .loading-screen {
      position: fixed; inset: 0; background: var(--bg); z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.5s;
    }
    .loading-screen.hide { opacity: 0; pointer-events: none; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <!-- Loading screen (muncul sementara auth cek) -->
  <div id="loadingScreen" class="loading-screen">
    <div class="w-8 h-8 border-2 border-green-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-gray-500 text-sm font-mono">VERIFYING ACCESS...</p>
  </div>

  <div class="grid-bg"></div>

  <!-- NAVBAR -->
  <nav id="mainNav" class="hidden fixed top-0 left-0 right-0 z-50 bg-dark-bg/80 backdrop-blur-xl border-b border-dark-border">
    <div class="max-w-7xl mx-auto px-4 md:px-8 h-16 flex items-center justify-between">
      <a href="store.html" class="flex items-center gap-2">
        <div class="w-7 h-7 bg-gradient-to-br from-green-400 to-cyan-500 rounded flex items-center justify-center font-bold text-black text-xs">K</div>
        <span class="font-bold text-sm tracking-wide">KRYONIX</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="track.html" class="text-sm text-gray-400 hover:text-white transition flex items-center gap-1.5 px-3 py-1.5 rounded-lg hover:bg-white/5">
          <i class="fas fa-search text-xs"></i><span class="hidden sm:inline">Lacak Pesanan</span>
        </a>
        <div class="h-5 w-px bg-dark-border"></div>
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-full bg-green-500/10 border border-green-500/20 flex items-center justify-center text-green-400 text-xs font-bold" id="navAvatar">?</div>
          <span class="text-sm text-gray-300 hidden sm:inline" id="navName">Loading...</span>
        </div>
        <button onclick="handleLogout()" class="text-gray-500 hover:text-red-400 transition ml-1 p-1.5 rounded-lg hover:bg-red-500/10" title="Logout">
          <i class="fas fa-sign-out-alt text-sm"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- CONTENT -->
  <div class="relative z-10 max-w-7xl mx-auto pt-24 pb-8 px-4 md:px-8">
    <div class="text-center mb-12">
      <div class="inline-block px-4 py-1 mb-4 rounded-full border border-green-500/30 text-green-400 text-xs font-mono tracking-widest bg-green-500/5">
        KRYONIX STORE
      </div>
      <h1 class="text-4xl md:text-6xl font-bold mb-4">PILIHAN HOSTING <br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-cyan-400">TERBAIK ANDA</span></h1>
      <p class="text-gray-400 max-w-2xl mx-auto">Performa tinggi, keamanan maksimal, dan harga transparan. Pilih paket yang sesuai dengan kebutuhan Anda.</p>
    </div>

    <div class="flex justify-center gap-3 mb-10 flex-wrap" id="filterContainer">
      <button onclick="filterProducts('all', this)" class="filter-btn active px-5 py-2 rounded-full border border-dark-border text-sm font-semibold hover:border-green-500">SEMUA</button>
      <button onclick="filterProducts('hosting', this)" class="filter-btn px-5 py-2 rounded-full border border-dark-border text-sm font-semibold hover:border-green-500">HOSTING</button>
      <button onclick="filterProducts('vps', this)" class="filter-btn px-5 py-2 rounded-full border border-dark-border text-sm font-semibold hover:border-green-500">VPS</button>
      <button onclick="filterProducts('domain', this)" class="filter-btn px-5 py-2 rounded-full border border-dark-border text-sm font-semibold hover:border-green-500">DOMAIN</button>
      <button onclick="filterProducts('game', this)" class="filter-btn px-5 py-2 rounded-full border border-dark-border text-sm font-semibold hover:border-green-500">GAME SERVER</button>
    </div>

    <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div class="col-span-full text-center py-20 text-gray-500">
        <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
        <p>Memuat produk dari server...</p>
      </div>
    </div>
  </div>

  <!-- ORDER MODAL -->
  <div id="orderModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 order-modal-backdrop" onclick="closeOrderModal()"></div>
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-md">
      <div class="bg-dark-card border border-dark-border rounded-2xl shadow-2xl p-6 m-4">
        <h3 class="text-xl font-bold mb-2">Formulir Pemesanan</h3>
        <p id="orderProductInfo" class="text-sm text-gray-500 mb-6"></p>
        <form onsubmit="submitOrder(event)">
          <input type="hidden" id="orderProductId">
          <input type="hidden" id="orderProductTitle">
          <input type="hidden" id="orderPrice">
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-mono text-gray-400 mb-1">NAMA LENGKAP</label>
              <input type="text" id="orderName" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-white focus:border-green-500 outline-none" placeholder="John Doe">
            </div>
            <div>
              <label class="block text-xs font-mono text-gray-400 mb-1">NO. WHATSAPP</label>
              <input type="text" id="orderWhatsapp" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-white focus:border-green-500 outline-none" placeholder="6281234567890">
            </div>
            <div>
              <label class="block text-xs font-mono text-gray-400 mb-1">CATATAN (opsional)</label>
              <textarea id="orderNote" rows="2" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-white focus:border-green-500 outline-none resize-none" placeholder="Catatan tambahan..."></textarea>
            </div>
            <div class="flex justify-end gap-3 pt-2">
              <button type="button" onclick="closeOrderModal()" class="px-4 py-2 rounded-lg border border-dark-border text-gray-400 hover:text-white transition">Batal</button>
              <button type="submit" class="px-6 py-2 rounded-lg bg-green-600 hover:bg-green-500 text-black font-bold transition">Kirim Pesanan</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- SCRIPTS -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { 
      getDatabase, ref, push, set, onValue, 
      runTransaction, serverTimestamp, get 
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    import { 
      getAuth, onAuthStateChanged, signOut 
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBHPvQ6Bt9f6U3wqDz3CG71HNpcFq3RZRI",
      authDomain: "kryonix-7c55e.firebaseapp.com",
      databaseURL: "https://kryonix-7c55e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kryonix-7c55e",
      storageBucket: "kryonix-7c55e.firebasestorage.app",
      messagingSenderId: "917095112473",
      appId: "1:917095112473:web:dd4120a14724e6e6a02f88",
      measurementId: "G-9Y77T2V6H7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let buyerProfile = null; // nama & WA dari RTDB

    // ══════════════════════════════════════
    // AUTH GUARD — wajib login dulu
    // ══════════════════════════════════════
    onAuthStateChanged(auth, async (user) => {
      const loader = document.getElementById('loadingScreen');

      if (!user) {
        // Belum login → kick
        window.location.href = 'login-buyer.html';
        return;
      }

      // Sudah login → ambil profil dari RTDB
      try {
        const snap = await get(ref(db, `users/${user.uid}`));
        if (snap.exists()) {
          buyerProfile = snap.val();
        }
      } catch(e) { console.error(e); }

      // Update navbar
      const name = buyerProfile?.name || user.email?.split('@')[0] || 'User';
      document.getElementById('navName').textContent = name;
      document.getElementById('navAvatar').textContent = name.charAt(0).toUpperCase();

      // Auto-fill form order kalau ada data profil
      if (buyerProfile?.name) document.getElementById('orderName').value = buyerProfile.name;
      if (buyerProfile?.whatsapp) document.getElementById('orderWhatsapp').value = buyerProfile.whatsapp;

      // Tampilkan navbar & sembunyikan loader
      document.getElementById('mainNav').classList.remove('hidden');
      loader.classList.add('hide');
      setTimeout(() => loader.remove(), 500);
    });

    // ══════════════════════════════════════
    // LOGOUT
    // ══════════════════════════════════════
    window.handleLogout = async () => {
      try {
        await signOut(auth);
        window.location.href = 'login-buyer.html';
      } catch(e) {
        console.error(e);
      }
    }

    // ══════════════════════════════════════
    // TOAST
    // ══════════════════════════════════════
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    // ══════════════════════════════════════
    // PRODUCTS (real-time)
    // ══════════════════════════════════════
    onValue(ref(db, "products"), (snapshot) => {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      const raw = snapshot.val();

      if (!raw) {
        grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500">Belum ada produk tersedia saat ini.</div>';
        return;
      }

      const sorted = Object.keys(raw)
        .map(k => ({ key: k, ...raw[k] }))
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      sorted.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.dataset.category = p.category;

        const outOfStock = (p.stock || 0) <= 0;
        const featuresHtml = (p.features || []).slice(0, 4).map(f =>
          `<li class="text-sm text-gray-400 flex items-center gap-2"><i class="fas fa-check text-green-500 text-xs"></i> ${f}</li>`
        ).join('');

        const safeTitle = (p.title || 'Untitled').replace(/'/g, "\\'");

        card.innerHTML = `
          <div class="relative">
            <img src="${p.image || 'https://picsum.photos/seed/default/600/400'}" alt="${p.title}" class="product-image" onerror="this.src='https://picsum.photos/seed/fallback-${p.key}/600/400'">
            <div class="absolute top-3 right-3 bg-black/60 backdrop-blur px-3 py-1 rounded-full text-xs font-mono text-white border border-white/10">
              ${(p.category || '').toUpperCase()}
            </div>
            ${outOfStock ? '<div class="absolute inset-0 bg-black/60 flex items-center justify-center"><span class="text-red-400 font-bold text-lg tracking-widest">HABIS</span></div>' : ''}
          </div>
          <div class="p-6">
            <h3 class="text-xl font-bold text-white mb-2">${p.title || 'Untitled'}</h3>
            <p class="text-sm text-gray-500 mb-4 h-10 line-clamp-2">${p.description || ''}</p>
            <div class="mb-6">
              <div class="text-2xl font-bold text-green-400 mb-1">Rp ${(p.price || 0).toLocaleString('id-ID')}</div>
              <div class="text-xs text-gray-600">per bulan</div>
            </div>
            <ul class="mb-6 space-y-2">${featuresHtml}</ul>
            <button class="btn-buy" ${outOfStock ? 'disabled' : ''} onclick="openOrderModal('${p.key}', '${safeTitle}', ${p.price})">
              ${outOfStock ? '<i class="fas fa-ban mr-2"></i> STOK HABIS' : '<i class="fas fa-shopping-cart mr-2"></i> BELI SEKARANG'}
            </button>
          </div>
        `;
        grid.appendChild(card);
      });
    });

    // ══════════════════════════════════════
    // FILTER
    // ══════════════════════════════════════
    window.filterProducts = (category, btn) => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.product-card').forEach(card => {
        card.style.display = (category === 'all' || card.dataset.category === category) ? '' : 'none';
      });
    };

    // ══════════════════════════════════════
    // ORDER MODAL
    // ══════════════════════════════════════
    window.openOrderModal = (productId, productTitle, price) => {
      document.getElementById('orderProductId').value = productId;
      document.getElementById('orderProductTitle').value = productTitle;
      document.getElementById('orderPrice').value = price;
      document.getElementById('orderProductInfo').innerHTML = `
        <span class="text-green-400 font-bold">${productTitle}</span> — Rp ${price.toLocaleString('id-ID')}/bulan
      `;
      document.getElementById('orderModal').classList.remove('hidden');
    }

    window.closeOrderModal = () => document.getElementById('orderModal').classList.add('hidden');

    // ══════════════════════════════════════
    // SUBMIT ORDER
    // ══════════════════════════════════════
    window.submitOrder = async (e) => {
      e.preventDefault();
      const productId = document.getElementById('orderProductId').value;
      const productTitle = document.getElementById('orderProductTitle').value;
      const price = parseInt(document.getElementById('orderPrice').value) || 0;
      const buyerName = document.getElementById('orderName').value.trim();
      const buyerWhatsapp = document.getElementById('orderWhatsapp').value.trim();
      const orderNote = document.getElementById('orderNote').value.trim();

      if (!buyerWhatsapp.match(/^(\+?62|62|0)8\d{8,12}$/)) {
        showToast("Format WhatsApp tidak valid. Contoh: 6281234567890", "error");
        return;
      }

      try {
        const productRef = ref(db, `products/${productId}`);
        const result = await runTransaction(productRef, (currentData) => {
          if (!currentData) return undefined;
          if ((currentData.stock || 0) <= 0) return undefined;
          return { ...currentData, stock: currentData.stock - 1 };
        });

        if (!result.committed) {
          showToast("Stok habis! Produk sudah dibeli orang lain.", "error");
          return;
        }

        const orderRef = push(ref(db, "orders"));
        await set(orderRef, {
          productId,
          productTitle,
          price,
          buyerName,
          buyerWhatsapp,
          buyerWhatsappClean: buyerWhatsapp.replace(/\D/g, ''),
          orderNote,
          status: 'pending',
          buyerUid: auth.currentUser.uid,
          createdAt: serverTimestamp()
        });

        closeOrderModal();
        showToast("Pesanan berhasil dikirim!");

        setTimeout(() => {
          window.location.href = `track.html?phone=${encodeURIComponent(buyerWhatsapp)}`;
        }, 1500);

      } catch (err) {
        console.error("Order error:", err);
        showToast("Gagal mengirim pesanan. Coba lagi.", "error");
      }
    }
  </script>
</body>
</html>
