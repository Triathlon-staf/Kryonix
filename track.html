<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lacak Pesanan | KRYONIX</title>
  <link rel="icon" type="image/png" href="images/icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Space Grotesk','sans-serif'],mono:['JetBrains Mono','monospace']},colors:{dark:{bg:'#060a10',card:'#0c1220',border:'#152035'},accent:{green:'#00e89d',cyan:'#00c4ff'}}}}}
  </script>
  <style>
    :root{--bg:#060a10;--fg:#e8ecf2;--green:#00e89d;--border:#152035}
    body{background:var(--bg);color:var(--fg);font-family:'Space Grotesk',sans-serif;min-height:100vh;padding:2rem 1.5rem 6rem}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,232,157,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,232,157,.03) 1px,transparent 1px);background-size:50px 50px;z-index:0;pointer-events:none}
    .toast{position:fixed;bottom:2rem;right:2rem;padding:1rem 1.5rem;border-radius:12px;font-size:.9rem;font-weight:600;z-index:9999;transform:translateY(120px);opacity:0;transition:all .4s cubic-bezier(.16,1,.3,1)}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{background:#065f46;color:#6ee7b7;border:1px solid #10b981}
    .toast.error{background:#7f1d1d;color:#fca5a5;border:1px solid #ef4444}
    .chat-bubble{max-width:80%;animation:fadeUp .25s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .status-badge{font-size:.7rem;padding:2px 8px;border-radius:9999px;font-weight:700;font-family:'JetBrains Mono',monospace}
    .img-preview-bar{background:rgba(0,232,157,.05);border:1px dashed rgba(0,232,157,.3);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:10px}
    .img-preview-bar img{height:48px;border-radius:6px;object-fit:cover;border:1px solid var(--border)}
    .img-btn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border:1px solid var(--border);color:#5a6a80;cursor:pointer;transition:all .15s;flex-shrink:0}
    .img-btn:hover{background:rgba(0,232,157,.08);color:var(--green);border-color:rgba(0,232,157,.3)}
    .qris-cmd-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:11px;font-family:'JetBrains Mono',monospace;background:rgba(0,232,157,.06);border:1px solid rgba(0,232,157,.15);color:#00e89d;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
    .qris-cmd-chip:hover{background:rgba(0,232,157,.15);border-color:rgba(0,232,157,.4);transform:translateY(-1px)}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="relative z-10 max-w-3xl mx-auto">

    <div class="text-center mb-10">
      <a href="store.html" class="inline-block text-gray-500 hover:text-white text-sm mb-4 transition"><i class="fas fa-arrow-left mr-1"></i> Kembali ke Store</a>
      <h1 class="text-3xl md:text-4xl font-bold mb-2">Lacak Pesanan</h1>
      <p class="text-gray-500 text-sm">Masukkan nomor WhatsApp yang digunakan saat memesan.</p>
    </div>

    <div class="bg-dark-card border border-dark-border rounded-2xl p-6 mb-8">
      <div class="flex gap-3">
        <div class="flex-1 relative">
          <i class="fas fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-sm"></i>
          <input type="text" id="searchPhone" class="w-full bg-dark-bg border border-dark-border rounded-xl pl-10 pr-4 py-3 text-white outline-none focus:border-green-500 transition placeholder-gray-600" placeholder="6281234567890">
        </div>
        <button onclick="searchOrders()" class="px-6 py-3 bg-accent-green hover:brightness-110 text-black font-bold rounded-xl transition flex-shrink-0"><i class="fas fa-search mr-2"></i>Cari</button>
      </div>
      <p id="searchError" class="text-red-400 text-xs mt-2 hidden"></p>
    </div>

    <div id="orderResults" class="space-y-4 hidden"></div>
    <div id="emptyState" class="hidden text-center py-16 text-gray-600">
      <i class="fas fa-box-open text-4xl mb-4"></i>
      <p>Tidak ada pesanan ditemukan untuk nomor ini.</p>
    </div>
  </div>

  <!-- PANEL: ORDER DETAIL + CHAT -->
  <div id="orderDetailPanel" class="hidden fixed inset-0 z-40">
    <div class="absolute inset-0 bg-black/60" onclick="closeOrderDetail()"></div>
    <div class="absolute right-0 top-0 bottom-0 w-full md:max-w-2xl bg-dark-bg border-l border-dark-border flex flex-col shadow-2xl">
      <div class="flex-shrink-0 border-b border-dark-border p-4 flex items-center justify-between bg-dark-card">
        <div>
          <div class="text-[11px] font-mono text-gray-500 tracking-wider">ORDER #<span id="detailOrderId">-</span></div>
          <div class="font-bold text-base mt-0.5" id="detailBuyerName">-</div>
        </div>
        <button onclick="closeOrderDetail()" class="w-9 h-9 rounded-lg bg-dark-bg border border-dark-border flex items-center justify-center text-gray-400 hover:text-white transition"><i class="fas fa-times"></i></button>
      </div>
      <div class="flex-1 overflow-y-auto min-h-0">
        <div class="p-4 border-b border-dark-border">
          <h4 class="text-xs font-mono text-gray-500 uppercase tracking-wider mb-3">Rincian Pesanan</h4>
          <div class="bg-dark-card border border-dark-border rounded-xl p-4 space-y-3 text-sm">
            <div class="flex justify-between"><span class="text-gray-500">Produk</span><span class="font-bold text-white" id="detailProduct">-</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Harga</span><span class="font-mono text-green-400" id="detailPrice">-</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Catatan</span><span class="text-gray-300 text-right max-w-[60%]" id="detailNote">-</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Tanggal</span><span class="font-mono text-gray-400" id="detailDate">-</span></div>
            <div class="flex justify-between items-center"><span class="text-gray-500">Status</span><span class="status-badge border" id="detailStatus">-</span></div>
          </div>
        </div>
        <div class="p-4">
          <h4 class="text-xs font-mono text-gray-500 uppercase tracking-wider mb-3"><i class="fas fa-comments mr-1"></i> Chat dengan Admin</h4>
          <div id="chatMessages" class="space-y-3 min-h-[100px]"><div class="text-center text-gray-600 text-sm py-8">Belum ada pesan.</div></div>
        </div>
      </div>
      <!-- ★ QRIS HINT BAR (baru) ★ -->
      <div id="qrisHintBar" class="hidden flex-shrink-0 border-t border-dark-border px-4 py-2 bg-dark-card/80">
        <div class="flex items-center gap-2 overflow-x-auto" id="qrisHintBarInner">
          <span class="text-[10px] text-gray-600 font-mono flex-shrink-0">METODE BAYAR:</span>
        </div>
      </div>
      <!-- CHAT INPUT -->
      <div class="flex-shrink-0 border-t border-dark-border p-4 bg-dark-card space-y-2">
        <div id="chatImagePreview" class="hidden img-preview-bar">
          <img id="chatPreviewImg" src="" alt="preview">
          <div class="flex-1 min-w-0">
            <div class="text-xs text-gray-400 truncate" id="chatPreviewName">image.jpg</div>
            <div class="text-[10px] text-gray-600">Bukti transfer siap dikirim</div>
          </div>
          <button onclick="clearChatImage()" class="w-6 h-6 rounded-full bg-red-500/20 flex items-center justify-center text-red-400 hover:bg-red-500/30 transition flex-shrink-0"><i class="fas fa-times text-[10px]"></i></button>
        </div>
        <input type="file" id="chatImageInput" accept="image/*" class="hidden">
        <div class="flex gap-2">
          <button onclick="document.getElementById('chatImageInput').click()" class="img-btn" title="Kirim bukti transfer"><i class="fas fa-image"></i></button>
          <input type="text" id="chatInput" class="flex-1 bg-dark-bg border border-dark-border rounded-xl px-4 py-2.5 text-white text-sm outline-none focus:border-green-500 transition placeholder-gray-600" placeholder="Ketik pesan untuk admin...">
          <button onclick="sendChat('buyer')" class="px-5 py-2.5 bg-green-600 hover:bg-green-500 text-black font-bold rounded-xl transition flex items-center gap-2"><i class="fas fa-paper-plane text-sm"></i><span class="hidden sm:inline">Kirim</span></button>
        </div>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div id="imageLightbox" class="hidden fixed inset-0 z-[999] bg-black/95 flex items-center justify-center p-4 cursor-zoom-out" onclick="closeLightbox()">
    <button class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-white text-lg hover:bg-white/20 transition"><i class="fas fa-times"></i></button>
    <img id="lightboxImg" class="max-w-full max-h-[90vh] rounded-xl object-contain" onclick="event.stopPropagation()">
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey:"AIzaSyBHPvQ6Bt9f6U3wqDz3CG71HNpcFq3RZRI", authDomain:"kryonix-7c55e.firebaseapp.com",
      databaseURL:"https://kryonix-7c55e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId:"kryonix-7c55e", storageBucket:"kryonix-7c55e.firebasestorage.app",
      messagingSenderId:"917095112473", appId:"1:917095112473:web:dd4120a14724e6e6a02f88", measurementId:"G-9Y77T2V6H7"
    };
    const app=initializeApp(firebaseConfig), db=getDatabase(app);

    const statusStyles={pending:'bg-yellow-500/10 text-yellow-400 border-yellow-500/20',processing:'bg-blue-500/10 text-blue-400 border-blue-500/20',completed:'bg-green-500/10 text-green-400 border-green-500/20',cancelled:'bg-red-500/10 text-red-400 border-red-500/20'};
    const statusLabels={pending:'Menunggu',processing:'Diproses',completed:'Selesai',cancelled:'Dibatalkan'};

    function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}
    function formatTime(ts){if(!ts||typeof ts!=='number')return '';const d=new Date(ts);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}

    const imageStore = {};
    window.viewImage = (key) => { if(imageStore[key]){ document.getElementById('lightboxImg').src=imageStore[key]; document.getElementById('imageLightbox').classList.remove('hidden'); } };
    window.closeLightbox = () => document.getElementById('imageLightbox').classList.add('hidden');
    document.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closeLightbox(); });

    function compressImage(file, maxW=800, quality=0.7) {
      return new Promise((resolve, reject) => {
        if(file.size > 8*1024*1024){ reject('File terlalu besar (max 8MB).'); return; }
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if(w > maxW){ h = (maxW/w)*h; w = maxW; }
            if(h > 800){ w = (800/h)*w; h = 800; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = () => reject('Gagal membaca gambar.');
          img.src = e.target.result;
        };
        reader.onerror = () => reject('Gagal membaca file.');
        reader.readAsDataURL(file);
      });
    }

    // ══════════════════════════════════════
    // ★ QRIS COMMANDS (buyer side)
    // ══════════════════════════════════════
    let qrisCommands = {};

    function loadQrisCommands() {
      onValue(ref(db, "settings/qris_commands"), (snap) => {
        const raw = snap.val();
        qrisCommands = {};
        if (raw) {
          Object.values(raw).forEach(q => {
            const cmd = (q.command || '').toLowerCase().trim();
            if (cmd) qrisCommands[cmd] = q;
          });
        }
        renderQrisHintBar();
      });
    }

    function renderQrisHintBar() {
      const bar = document.getElementById('qrisHintBar');
      const inner = document.getElementById('qrisHintBarInner');
      const cmds = Object.keys(qrisCommands);
      if (cmds.length === 0) { bar.classList.add('hidden'); return; }
      bar.classList.remove('hidden');
      inner.innerHTML = '<span class="text-[10px] text-gray-600 font-mono flex-shrink-0">METODE BAYAR:</span>';
      cmds.forEach(cmd => {
        const q = qrisCommands[cmd];
        const chip = document.createElement('button');
        chip.className = 'qris-cmd-chip';
        // Tampilkan command + nama singkat
        const shortLabel = q.label ? q.label.split(' - ')[0] : '';
        chip.textContent = cmd + (shortLabel ? ' ' + shortLabel : '');
        chip.title = 'Minta pembayaran via ' + (q.label || cmd);
        chip.onclick = () => quickSendQris(cmd);
        inner.appendChild(chip);
      });
    }

    // Buyer klik chip → auto request + auto reply QRIS
    window.quickSendQris = async (cmd) => {
      if (!currentChatOrderId) return;
      const q = qrisCommands[cmd];
      if (!q || !q.image) return;
      try {
        // Kirim pesan buyer: request
        await set(push(ref(db, `orders/${currentChatOrderId}/chat`)), {
          sender: 'buyer',
          text: 'Saya ingin membayar via ' + (q.label || cmd),
          timestamp: serverTimestamp()
        });
        // Auto-reply QRIS dari admin (system)
        await set(push(ref(db, `orders/${currentChatOrderId}/chat`)), {
          sender: 'admin',
          text: '💰 Pembayaran via ' + (q.label || cmd) + '. Silakan scan QRIS berikut:',
          image: q.image,
          timestamp: serverTimestamp()
        });
      } catch(e) { showToast('Gagal.', 'error'); }
    };

    // Load QRIS commands saat page load
    loadQrisCommands();
    // ══════════════════════════════════════

    let pendingChatImage = null;
    document.getElementById('chatImageInput').addEventListener('change', async (e) => {
      const file = e.target.files[0]; if(!file) return;
      try {
        showToast('Memproses...');
        pendingChatImage = await compressImage(file);
        document.getElementById('chatPreviewImg').src = pendingChatImage;
        document.getElementById('chatPreviewName').textContent = file.name;
        document.getElementById('chatImagePreview').classList.remove('hidden');
      } catch(err) { showToast(typeof err==='string'?err:'Gagal.', 'error'); }
      e.target.value = '';
    });
    window.clearChatImage = () => {
      pendingChatImage = null;
      document.getElementById('chatImagePreview').classList.add('hidden');
    };

    const urlParams=new URLSearchParams(window.location.search);
    if(urlParams.get('phone')){document.getElementById('searchPhone').value=urlParams.get('phone');searchOrders();}
    document.getElementById('searchPhone').addEventListener('keydown',(e)=>{if(e.key==='Enter')searchOrders();});

    window.searchOrders=()=>{
      const phone=document.getElementById('searchPhone').value.trim().replace(/\D/g,'');
      const errEl=document.getElementById('searchError');
      errEl.classList.add('hidden');
      if(!phone||phone.length<10){errEl.textContent='Masukkan nomor WhatsApp yang valid (min. 10 digit).';errEl.classList.remove('hidden');return;}

      onValue(ref(db,"orders"),(snap)=>{
        const raw=snap.val();
        const results=document.getElementById('orderResults');
        const empty=document.getElementById('emptyState');
        results.innerHTML=''; results.classList.add('hidden'); empty.classList.add('hidden');
        if(!raw){empty.classList.remove('hidden');return;}

        const matched=Object.keys(raw).map(k=>({key:k,...raw[k]}))
          .filter(o=>(o.buyerWhatsapp||'').replace(/\D/g,'')===phone)
          .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

        if(matched.length===0){empty.classList.remove('hidden');return;}
        results.classList.remove('hidden');

        matched.forEach(o=>{
          const ss=statusStyles[o.status]||statusStyles.pending;
          const sl=statusLabels[o.status]||o.status;
          let chatCount=0; if(o.chat) chatCount=Object.keys(o.chat).length;
          const div=document.createElement('div');
          div.className='bg-dark-card border border-dark-border rounded-2xl p-5 hover:border-green-500/30 transition cursor-pointer';
          div.onclick=()=>openOrderDetail(o.key);
          div.innerHTML=`
            <div class="flex items-start justify-between mb-3">
              <div>
                <h3 class="font-bold text-white text-lg">${o.productTitle||'-'}</h3>
                <p class="text-green-400 font-mono text-sm">Rp ${(o.price||0).toLocaleString('id-ID')}/bln</p>
              </div>
              <span class="status-badge border ${ss}">${sl}</span>
            </div>
            <div class="flex items-center justify-between text-xs text-gray-500">
              <span><i class="far fa-calendar mr-1"></i>${formatTime(o.createdAt)}</span>
              <span class="flex items-center gap-1 ${chatCount?'text-cyan-400':'text-gray-600'}"><i class="fas fa-comments"></i> ${chatCount} pesan</span>
            </div>
          `;
          results.appendChild(div);
        });
      },{onlyOnce:true});
    }

    let currentChatOrderId=null, unsubOrder=null, unsubChat=null;

    window.openOrderDetail=(orderId)=>{
      currentChatOrderId=orderId;
      document.getElementById('orderDetailPanel').classList.remove('hidden');
      document.getElementById('chatMessages').innerHTML='<div class="text-center text-gray-600 text-sm py-8"><i class="fas fa-spinner fa-spin mr-1"></i>Memuat...</div>';
      document.getElementById('chatInput').value='';
      clearChatImage();
      renderQrisHintBar();

      unsubOrder=onValue(ref(db,`orders/${orderId}`),(snap)=>{
        const o=snap.val(); if(!o)return;
        document.getElementById('detailOrderId').textContent=orderId.slice(-6).toUpperCase();
        document.getElementById('detailBuyerName').textContent=o.buyerName||'-';
        document.getElementById('detailProduct').textContent=o.productTitle||'-';
        document.getElementById('detailPrice').textContent='Rp '+(o.price||0).toLocaleString('id-ID')+'/bln';
        document.getElementById('detailNote').textContent=o.orderNote||'-';
        document.getElementById('detailDate').textContent=formatTime(o.createdAt);
        const ss=statusStyles[o.status]||statusStyles.pending;
        const sl=statusLabels[o.status]||o.status;
        const statusEl=document.getElementById('detailStatus');
        statusEl.textContent=sl; statusEl.className=`status-badge border ${ss}`;
      });

      unsubChat=onValue(ref(db,`orders/${orderId}/chat`),(snap)=>{
        const container=document.getElementById('chatMessages');
        const raw=snap.val(); container.innerHTML='';
        if(!raw){container.innerHTML='<div class="text-center text-gray-600 text-sm py-8">Belum ada pesan. Tanyakan sesuatu ke admin.</div>';return;}
        const msgs=Object.keys(raw).map(k=>({key:k,...raw[k]})).sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
