<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partners | KRYONIX</title>
  <link rel="icon" type="image/png" href="images/icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        fontFamily: { sans: ['Space Grotesk', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
        colors: { dark: { bg: '#060a10', card: '#0c1220', border: '#152035' }, accent: { green: '#00e89d', cyan: '#00c4ff' } }
      }}
    }
  </script>
  <style>
    :root { --bg: #060a10; --bg-card: #0c1220; --border: #152035; --green: #00e89d; --cyan: #00c4ff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: #e8ecf2; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
    .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,232,157,0.03) 1px, transparent 1px), linear-gradient(90deg,rgba(0,232,157,0.03) 1px, transparent 1px); background-size: 50px 50px; z-index: 0; pointer-events: none; }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: orbFloat 10s ease-in-out infinite alternate; }
    .orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,232,157,0.06), transparent 70%); top: -100px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,196,255,0.05), transparent 70%); bottom: -50px; left: -100px; animation-delay: -5s; }
    @keyframes orbFloat { 0% { transform: translate(0,0); } 100% { transform: translate(20px, 30px); } }
    .partner-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; transition: all 0.4s; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; overflow: hidden; }
    .partner-card:hover { transform: translateY(-6px); border-color: rgba(0,232,157,0.3); box-shadow: 0 15px 40px rgba(0,0,0,0.3), 0 0 15px rgba(0,232,157,0.08); }
    .partner-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--green), var(--cyan)); transform: scaleX(0); transform-origin: left; transition: transform 0.4s; }
    .partner-card:hover::before { transform: scaleX(1); }
    .partner-logo { width: 80px; height: 80px; border-radius: 16px; object-fit: contain; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px; margin-bottom: 1.25rem; }
    .text-gradient { background: linear-gradient(135deg, var(--green), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-link { position: relative; color: #5a6a80; font-size: 0.9rem; transition: 0.3s; text-decoration: none; }
    .nav-link:hover, .nav-link.active { color: var(--green); }
    .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--green); transition: 0.3s; }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <nav class="fixed w-full top-0 z-50 glass-nav border-b border-dark-border" style="backdrop-filter:blur(16px);background:rgba(6,10,16,0.85);">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2.5 group"><div class="w-9 h-9 bg-gradient-to-br from-green-400 to-cyan-500 rounded-lg flex items-center justify-center font-bold text-black text-base">K</div><span class="text-lg font-bold tracking-wide group-hover:text-green-400 transition hidden sm:inline">KRYONIX</span></a>
      <div class="hidden md:flex items-center gap-6">
        <a href="index.html" class="nav-link">Home</a>
        <a href="store.html" class="nav-link">Store</a>
        <a href="tos.html" class="nav-link">Important</a>
        <a href="chat.html" class="nav-link">Chat</a>
        <a href="partners.html" class="nav-link active">Partners</a>
      </div>
      <a id="loginBtn" href="login-buyer.html" class="text-sm text-green-400 hover:text-green-300 px-3 py-1.5 rounded-lg hover:bg-green-500/10 transition"><i class="fas fa-user mr-1"></i><span class="hidden sm:inline">Login</span></a>
      <button id="menuBtn" class="md:hidden text-xl text-gray-400"><i class="fas fa-bars"></i></button>
    </div>
    <div id="mobileMenu" class="hidden md:hidden border-t border-dark-border p-4 space-y-3" style="background:var(--bg-card);">
      <a href="index.html" class="block text-gray-400 hover:text-green-400 text-sm transition">Home</a>
      <a href="store.html" class="block text-gray-400 hover:text-green-400 text-sm transition">Store</a>
      <a href="tos.html" class="block text-gray-400 hover:text-green-400 text-sm transition">Important</a>
      <a href="chat.html" class="block text-gray-400 hover:text-green-400 text-sm transition">Chat</a>
      <a href="partners.html" class="block text-green-400 font-semibold text-sm">Partners</a>
    </div>
  </nav>

  <main class="relative z-10 pt-24 pb-16 px-4 md:px-8">
    <div class="max-w-7xl mx-auto">
      <div class="text-center mb-12">
        <div class="inline-block px-4 py-1 mb-4 rounded-full border border-green-500/30 text-green-400 text-xs font-mono tracking-widest bg-green-500/5">TRUSTED PARTNERS</div>
        <h1 class="text-4xl md:text-5xl font-bold mb-4">KOLABORASI <span class="text-gradient">STRATEGIS</span></h1>
        <p class="text-gray-400 max-w-xl mx-auto">Kami bekerja sama dengan berbagai provider infrastruktur dan platform terkemuka untuk memberikan layanan terbaik.</p>
      </div>
      <div id="partnerGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
        <div class="col-span-full text-center py-16 text-gray-500"><i class="fas fa-spinner fa-spin text-2xl mb-3 text-green-400"></i><p>Loading partners...</p></div>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBHPvQ6Bt9f6U3wqDz3CG71HNpcFq3RZRI",
      authDomain: "kryonix-7c55e.firebaseapp.com",
      databaseURL: "https://kryonix-7c55e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kryonix-7c55e", storageBucket: "kryonix-7c55e.firebasestorage.app",
      messagingSenderId: "917095112473", appId: "1:917095112473:web:dd4120a14724e6e6a02f88", measurementId: "G-9Y77T2V6H7"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);
    const auth = getAuth(fbApp);

    const partnerCatIcons = { infrastructure:'fa-server', payment:'fa-credit-card', security:'fa-shield-alt', cdn:'fa-bolt', domain:'fa-globe', game:'fa-gamepad', other:'fa-star' };
    const partnerCatColors = { infrastructure:'text-cyan-400', payment:'text-green-400', security:'text-purple-400', cdn:'text-yellow-400', domain:'text-blue-400', game:'text-pink-400', other:'text-gray-400' };

    onAuthStateChanged(auth, async (user) => {
      const btn = document.getElementById('loginBtn');
      if (user) btn.classList.add('hidden');
      else btn.classList.remove('hidden');
    });

    onValue(ref(db, "partners"), (snap) => {
      const grid = document.getElementById('partnerGrid');
      const raw = snap.val();
      grid.innerHTML = '';
      if (!raw) {
        grid.innerHTML = '<div class="col-span-full text-center py-16 text-gray-600"><i class="fas fa-handshake text-3xl mb-3"></i><p>Belum ada partner.</p></div>';
        return;
      }
      Object.keys(raw).forEach(k => {
        const p = raw[k];
        const color = partnerCatColors[p.category] || 'text-gray-400';
        const icon = p.icon || partnerCatIcons[p.category] || 'fa-star';
        const card = document.createElement('a');
        card.href = p.website || '#';
        card.target = p.website ? '_blank' : '';
        card.rel = 'noopener';
        card.className = 'partner-card';
        card.innerHTML = `
          ${p.logo
            ? `<img src="${p.logo}" alt="${p.name}" class="partner-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="partner-logo flex-col items-center justify-center" style="display:none"><i class="fas ${icon} text-2xl ${color}"></i></div>`
            : `<div class="partner-logo flex items-center justify-center"><i class="fas ${icon} text-2xl ${color}"></i></div>`
          }
          <h3 class="font-bold text-sm text-white mb-1">${p.name}</h3>
          <p class="text-xs text-gray-500 mb-3 line-clamp-2 flex-1">${p.description || ''}</p>
          <span class="inline-block px-2.5 py-0.5 rounded-full text-[10px] font-mono uppercase bg-dark-bg border border-dark-border ${color}">${p.category}</span>
        `;
        grid.appendChild(card);
      });
    });

    document.getElementById('menuBtn').addEventListener('click', () => {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    });
  </script>
</body>
</html>
