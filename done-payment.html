<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Done Payment | KRYONIX</title>
  <link rel="icon" type="image/png" href="images/icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00e89d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="images/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        fontFamily: { sans: ['Space Grotesk','sans-serif'], mono: ['JetBrains Mono','monospace'] },
        colors: { dark:{ bg:'#060a10', card:'#0c1220', border:'#152035' }, accent:{ green:'#00e89d', cyan:'#00c4ff' } }
      }}
    }
  </script>
  <style>
    :root{--bg:#060a10;--card:#0c1220;--border:#152035;--green:#00e89d}
    body{background:var(--bg);color:#e8ecf2;font-family:'Space Grotesk',sans-serif}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
    .glow-line{height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:.3}
    .pay-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all .3s;position:relative;overflow:hidden}
    .pay-card:hover{border-color:rgba(0,232,157,.25);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,232,157,.06)}
    .pay-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:0;transition:opacity .3s}
    .pay-card:hover::before{opacity:1}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .5s ease both}
    .pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,232,157,.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(0,232,157,0)}}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden}
    .stat-card::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.05}
    .stat-card.green::after{background:var(--green)}
    .stat-card.cyan::after{background:#00c4ff}
  </style>
</head>
<body class="min-h-screen">

  <!-- BG GLOW -->
  <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-accent-green/5 rounded-full blur-[120px] pointer-events-none"></div>

  <div class="relative z-10 max-w-4xl mx-auto px-4 py-10 md:py-16">

    <!-- HEADER -->
    <div class="text-center mb-10 fade-up">
      <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-green-500/10 border border-green-500/20 mb-5">
        <div class="pulse-dot"></div>
        <span class="text-xs font-mono text-green-400 font-bold tracking-wider">LIVE TRANSACTIONS</span>
      </div>
      <h1 class="text-3xl md:text-5xl font-bold mb-3">
        Done <span class="text-accent-green">Payment</span>
      </h1>
      <p class="text-gray-500 text-sm md:text-base max-w-md mx-auto">Transaksi pembayaran yang berhasil diverifikasi oleh admin KRYONIX.</p>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-2 gap-4 mb-10 fade-up" style="animation-delay:.1s">
      <div class="stat-card green">
        <div class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-1">Total Transaksi</div>
        <div id="pubTotal" class="text-2xl md:text-3xl font-bold text-white">0</div>
      </div>
      <div class="stat-card cyan">
        <div class="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-1">Total Revenue</div>
        <div id="pubRevenue" class="text-2xl md:text-3xl font-bold text-green-400">Rp0</div>
      </div>
    </div>

    <div class="glow-line mb-10"></div>

    <!-- LIST -->
    <div id="payList" class="space-y-3">
      <div class="text-center py-16 text-gray-600">
        <i class="fas fa-spinner fa-spin text-2xl mb-4 text-gray-700"></i>
        <p class="text-sm">Memuat data transaksi...</p>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="text-center mt-12 fade-up" style="animation-delay:.2s">
      <div class="glow-line mb-6"></div>
      <a href="store.html" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-green-600 hover:bg-green-500 text-black font-bold transition shadow-lg shadow-green-500/20">
        <i class="fas fa-shopping-cart"></i> Pesan Sekarang
      </a>
      <p class="text-xs text-gray-600 mt-4 font-mono">KRYONIX &copy; 2025 — All transactions verified by admin</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = { apiKey:"AIzaSyBHPvQ6Bt9f6U3wqDz3CG71HNpcFq3RZRI", authDomain:"kryonix-7c55e.firebaseapp.com", databaseURL:"https://kryonix-7c55e-default-rtdb.asia-southeast1.firebasedatabase.app", projectId:"kryonix-7c55e", storageBucket:"kryonix-7c55e.firebasestorage.app", messagingSenderId:"917095112473", appId:"1:917095112473:web:dd4120a14724e6e6a02f88", measurementId:"G-9Y77T2V6H7" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function esc(t) { if (!t) return ''; var d = document.createElement('div'); d.textContent = String(t); return d.innerHTML; }

    function timeAgo(ts) {
      if (!ts || typeof ts !== 'number') return '';
      var diff = Date.now() - ts;
      var m = Math.floor(diff / 60000);
      if (m < 1) return 'Baru saja';
      if (m < 60) return m + ' menit lalu';
      var h = Math.floor(m / 60);
      if (h < 24) return h + ' jam lalu';
      var d = Math.floor(h / 24);
      if (d < 30) return d + ' hari lalu';
      return new Date(ts).toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
    }

    onValue(ref(db, 'done_payments'), function(snap) {
      var container = document.getElementById('payList');
      var raw = snap.val();
      var total = 0, revenue = 0;

      if (!raw) {
        container.innerHTML = '<div class="text-center py-16 text-gray-600"><i class="fas fa-inbox text-4xl mb-4 text-gray-700"></i><p class="text-sm">Belum ada transaksi terverifikasi.</p></div>';
        document.getElementById('pubTotal').textContent = '0';
        document.getElementById('pubRevenue').textContent = 'Rp0';
        return;
      }

      // Hanya tampil yang visible=true, sorted terbaru
      var items = Object.keys(raw)
        .map(function(k) { return { key: k, val: raw[k] }; })
        .filter(function(item) { return item.val.visible !== false; })
        .sort(function(a, b) { return (b.val.createdAt || 0) - (a.val.createdAt || 0); });

      if (items.length === 0) {
        container.innerHTML = '<div class="text-center py-16 text-gray-600"><i class="fas fa-inbox text-4xl mb-4 text-gray-700"></i><p class="text-sm">Belum ada transaksi terverifikasi.</p></div>';
      } else {
        container.innerHTML = '';
        items.forEach(function(item, idx) {
          var d = item.val;
          total++;
          revenue += (d.price || 0);

          var card = document.createElement('div');
          card.className = 'pay-card fade-up';
          card.style.animationDelay = (idx * 0.06) + 's';

          // Avatar dari inisial
          var initial = (d.buyerName || '?').charAt(0).toUpperCase();
          var colors = ['bg-green-500/20 text-green-400', 'bg-cyan-500/20 text-cyan-400', 'bg-purple-500/20 text-purple-400', 'bg-yellow-500/20 text-yellow-400', 'bg-pink-500/20 text-pink-400'];
          var colorClass = colors[idx % colors.length];

          card.innerHTML =
            '<div class="flex items-start gap-4">' +
              '<div class="w-11 h-11 rounded-xl ' + colorClass + ' flex items-center justify-center font-bold text-lg flex-shrink-0">' + initial + '</div>' +
              '<div class="flex-1 min-w-0">' +
                '<div class="flex items-center justify-between gap-2 mb-1">' +
                  '<span class="font-bold text-white text-sm truncate">' + esc(d.buyerName) + '</span>' +
                  '<div class="flex items-center gap-1.5 flex-shrink-0">' +
                    '<i class="fas fa-check-circle text-green-400 text-xs"></i>' +
                    '<span class="text-[10px] font-mono text-gray-500">' + timeAgo(d.createdAt) + '</span>' +
                  '</div>' +
                '</div>' +
                '<div class="text-xs text-gray-400 mb-2">' + esc(d.product) + (d.pkg ? ' <span class="text-gray-600">·</span> <span class="font-mono text-gray-500">' + esc(d.pkg) + '</span>' : '') + '</div>' +
                '<div class="flex items-center justify-between">' +
                  '<span class="text-xs text-gray-600 font-mono uppercase tracking-wider">Paid</span>' +
                  '<span class="font-bold text-green-400 font-mono text-sm">Rp' + (d.price || 0).toLocaleString('id-ID') + '</span>' +
                '</div>' +
              '</div>' +
            '</div>';

          container.appendChild(card);
        });
      }

      document.getElementById('pubTotal').textContent = total;
      document.getElementById('pubRevenue').textContent = 'Rp' + revenue.toLocaleString('id-ID');
    });
  </script>
  <script>
    if('serviceWorker'in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').then(function(){}).catch(function(){});});}
  </script>
</body>
</html>
