<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRYONIX | SECURE LOGIN</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- STYLE CONFIG -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Space Grotesk', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: { dark: { bg: '#060a10', card: '#0c1220', border: '#152035' }, accent: { green: '#00e89d', cyan: '#00c4ff', red: '#ff4757' } }
        }
      }
    }
  </script>

  <style>
    :root { --bg: #060a10; --bg-card: #0c1220; --fg: #e8ecf2; --green: #00e89d; --border: #152035; }
    
    body { 
      background: var(--bg); 
      color: var(--fg); 
      font-family: 'Space Grotesk', sans-serif; 
      overflow: hidden; 
      height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    
    /* BACKGROUND EFFECTS */
    .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,232,157,0.03) 1px, transparent 1px), linear-gradient(90deg,rgba(0,232,157,0.03) 1px, transparent 1px); background-size: 50px 50px; z-index: 0; pointer-events: none; }
    .scanline { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px); }
    
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: orbFloat 10s ease-in-out infinite alternate; }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,232,157,0.08), transparent 70%); top: -150px; left: -150px; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,196,255,0.06), transparent 70%); bottom: -100px; right: -100px; animation-delay: -5s; }
    @keyframes orbFloat { 0% { transform: translate(0,0); } 100% { transform: translate(30px, 50px); } }
    
    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* LOGIN CARD */
    .login-card { 
      position: relative; 
      z-index: 50; /* Dinaikkan agar tidak tertutup elemen lain */
      width: 100%; 
      max-width: 440px; 
      background: rgba(12, 18, 32, 0.85); 
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border); 
      border-radius: 20px; 
      padding: 2.5rem; 
      box-shadow: 0 0 50px rgba(0,0,0,0.5); 
      transition: transform 0.3s ease;
    }
    
    /* ROLES & BUTTONS */
    .role-btn { 
      flex: 1; 
      padding: 10px; 
      border-radius: 8px; 
      font-weight: 600; 
      font-size: 0.9rem; 
      cursor: pointer; 
      transition: all 0.3s; 
      border: 1px solid transparent; 
      background: rgba(255,255,255,0.03); 
      color: #5a6a80; 
    }
    .role-btn.active { 
      background: rgba(0, 232, 157, 0.1); 
      border-color: rgba(0, 232, 157, 0.3); 
      color: var(--green); 
      box-shadow: 0 0 15px rgba(0,232,157,0.1); 
    }

    .auth-toggle { 
      font-size: 0.8rem; 
      color: #5a6a80; 
      text-align: center; 
      margin-top: 1rem; 
      cursor: pointer; 
      transition: color 0.2s;
      user-select: none; /* Mencegah seleksi teks saat klik cepat */
    }
    .auth-toggle:hover { color: var(--green); text-decoration: underline; }

    /* INPUT FIELDS */
    .input-group { position: relative; margin-bottom: 1.5rem; }
    .input-field { 
      width: 100%; 
      background: #080c14; 
      border: 1px solid var(--border); 
      padding: 14px 16px; 
      border-radius: 10px; 
      color: white; 
      outline: none; 
      transition: all 0.3s; 
      font-family: 'Space Grotesk'; 
      box-sizing: border-box; 
    }
    .input-field:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(0,232,157,0.1); }
    .input-label { 
      position: absolute; 
      left: 16px; 
      top: 14px; 
      color: #5a6a80; 
      font-size: 0.9rem; 
      pointer-events: none; 
      transition: all 0.3s; 
      background: transparent; 
      padding: 0 4px; 
    }
    .input-field:focus + .input-label, .input-field:not(:placeholder-shown) + .input-label { 
      top: -10px; 
      left: 10px; 
      font-size: 0.75rem; 
      background: #0c1220; 
      color: var(--green); 
    }

    /* MAIN BUTTON */
    .btn-login { 
      width: 100%; 
      padding: 14px; 
      border-radius: 10px; 
      font-weight: 700; 
      font-size: 1rem; 
      background: linear-gradient(135deg, var(--green), #00c4a0); 
      color: #060a10; 
      border: none; 
      cursor: pointer; 
      transition: all 0.3s; 
      box-shadow: 0 0 20px rgba(0,232,157,0.2); 
      display: flex; 
      align-items: center; 
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover { box-shadow: 0 0 30px rgba(0,232,157,0.5); transform: translateY(-2px); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    
    /* FORM ANIMATIONS */
    .form-content { display: none; animation: fadeIn 0.4s ease-out; }
    .form-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* TOAST NOTIFICATION SYSTEM */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      background: rgba(12, 18, 32, 0.95);
      backdrop-filter: blur(10px);
      border-left: 4px solid var(--green);
      padding: 16px 24px;
      border-radius: 4px;
      color: white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 300px;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      font-size: 0.9rem;
    }
    .toast.show { transform: translateX(0); }
    .toast.error { border-left-color: var(--accent-red); }
    .toast i { font-size: 1.2rem; }
    .toast.success i { color: var(--green); }
    .toast.error i { color: var(--accent-red); }

  </style>
</head>
<body>

  <!-- BACKGROUND -->
  <div class="grid-bg"></div>
  <canvas id="particles"></canvas>
  <div class="scanline"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- TOAST CONTAINER -->
  <div id="toast-container"></div>

  <!-- LOGIN CARD -->
  <div class="login-card">
    
    <!-- LOGO -->
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-gradient-to-br from-green-400 to-cyan-500 rounded-xl mb-3 shadow-lg shadow-green-500/20">
        <i class="fas fa-user-shield text-2xl text-black"></i>
      </div>
      <h1 class="text-xl font-bold tracking-wide">KRYONIX</h1>
      <p class="text-[10px] text-gray-500 font-mono mt-1">SECURE ACCESS PROTOCOL v3.0 (EMAIL ENABLED)</p>
    </div>

    <!-- ROLE SWITCHER -->
    <div class="flex gap-3 mb-6 bg-dark-bg/50 p-1 rounded-xl border border-dark-border">
      <button id="btn-admin" class="role-btn active">
        <i class="fas fa-user-lock mr-2"></i> ADMIN
      </button>
      <button id="btn-buyer" class="role-btn">
        <i class="fas fa-users mr-2"></i> BUYER
      </button>
    </div>

    <form id="authForm">
      
      <!-- ADMIN LOGIN -->
      <div id="form-admin" class="form-content active">
        <p class="text-xs text-gray-500 mb-4 bg-dark-bg/50 p-2 rounded border border-dark-border text-center">
          <i class="fas fa-shield-alt text-green-500 mr-1"></i> Hardcoded Admin Access
        </p>
        <div class="input-group">
          <input type="text" id="admin-user" class="input-field" placeholder=" " required autocomplete="off">
          <label class="input-label">ADMIN ID</label>
        </div>
        <div class="input-group">
          <input type="password" id="admin-pass" class="input-field" placeholder=" " required>
          <label class="input-label">ACCESS KEY</label>
        </div>
        <p class="text-[10px] text-gray-600 mt-2 text-center font-mono">Default: admin / admin</p>
      </div>

      <!-- BUYER LOGIN (Email Based) -->
      <div id="form-buyer-login" class="form-content">
        <div class="input-group">
          <input type="email" id="buyer-login-email" class="input-field" placeholder=" " required autocomplete="email">
          <label class="input-label">EMAIL ADDRESS</label>
        </div>
        <div class="input-group">
          <input type="password" id="buyer-login-pass" class="input-field" placeholder=" " required>
          <label class="input-label">PASSWORD</label>
        </div>
        <div class="auth-toggle" id="link-to-register">Belum punya akun? Daftar disini</div>
      </div>

      <!-- BUYER REGISTER (Email Based) -->
      <div id="form-buyer-register" class="form-content">
        <div class="input-group">
          <input type="email" id="buyer-reg-email" class="input-field" placeholder=" " required autocomplete="email">
          <label class="input-label">EMAIL ADDRESS</label>
        </div>
        <div class="input-group">
          <input type="text" id="buyer-reg-name" class="input-field" placeholder=" " required autocomplete="off">
          <label class="input-label">USERNAME (Display Name)</label>
        </div>
        <div class="input-group">
          <input type="password" id="buyer-reg-pass" class="input-field" placeholder=" " required>
          <label class="input-label">PASSWORD</label>
        </div>
        <div class="auth-toggle" id="link-to-login">Sudah punya akun? Login disini</div>
      </div>

      <!-- SUBMIT BUTTON -->
      <button type="submit" id="submit-btn" class="btn-login">
        <span id="btn-text">AUTHENTICATE ADMIN</span>
        <i class="fas fa-sign-in-alt" id="btn-icon"></i>
      </button>

    </form>

    <!-- FOOTER LINK -->
    <div class="mt-6 text-center border-t border-dark-border pt-4">
      <a href="index.html" class="text-xs text-gray-600 hover:text-green-400 transition flex items-center justify-center gap-2">
        <i class="fas fa-globe"></i> Back to Home Page
      </a>
    </div>

  </div>

  <!-- SCRIPTS -->
  <script type="module">
    // IMPORT FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBHPvQ6Bt9f6U3wqDz3CG71HNpcFq3RZRI",
      authDomain: "kryonix-7c55e.firebaseapp.com",
      projectId: "kryonix-7c55e",
      storageBucket: "kryonix-7c55e.firebasestorage.app",
      messagingSenderId: "917095112473",
      appId: "1:917095112473:web:dd4120a14724e6e6a02f88",
      measurementId: "G-9Y77T2V6H7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- DATA & STATE ---
    const allowedAdmins = [
      { id: 'admin', key: 'admin' },
      { id: 'root', key: 'toor' }
    ];

    let currentRole = 'admin'; 
    let buyerMode = 'login';
    let isProcessing = false;

    // --- HELPER: TOAST ---
    window.showToast = (message, type = 'info') => {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      let iconClass = 'fa-info-circle';
      let colorClass = '';
      
      if (type === 'success') { iconClass = 'fa-check-circle'; colorClass = 'success'; }
      if (type === 'error') { iconClass = 'fa-exclamation-triangle'; colorClass = 'error'; }
      
      toast.className = `toast ${colorClass}`;
      toast.innerHTML = `<i class="fas ${iconClass}"></i><span>${message}</span>`;
      
      container.appendChild(toast);
      
      requestAnimationFrame(() => { toast.classList.add('show'); });

      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400); 
      }, 3000);
    }

    // --- CORE FUNCTIONS (BOUND TO WINDOW) ---
    
    // 1. Switch Role (Admin <-> Buyer)
    window.switchRole = (role) => {
      if(isProcessing) return;
      currentRole = role;
      buyerMode = 'login'; 
      updateUI();
    }

    // 2. Toggle Buyer Mode (Login <-> Register)
    window.toggleBuyerMode = (mode) => {
      if(isProcessing) return;
      buyerMode = mode;
      updateUI();
    }

    // 3. Handle Authentication (Login/Register)
    window.handleAuth = async (e) => {
      e.preventDefault();
      if (isProcessing) return;

      const btnText = document.getElementById('btn-text');
      const btnIcon = document.getElementById('btn-icon');
      const btn = document.getElementById('submit-btn');
      
      // Start Loading
      isProcessing = true;
      const originalText = btnText.innerText;
      btnText.innerText = "PROCESSING...";
      btnIcon.className = "fas fa-spinner fa-spin";
      btn.disabled = true;

      try {
        if (currentRole === 'admin') {
          // --- ADMIN LOGIN (Local) ---
          const id = document.getElementById('admin-user').value;
          const key = document.getElementById('admin-pass').value;

          const admin = allowedAdmins.find(a => a.id === id && a.key === key);

          if (admin) {
            showToast("ACCESS GRANTED: WELCOME ADMIN", "success");
            // Redirect ke admin.html
            setTimeout(() => { window.location.href = 'admin.html'; }, 1000);
          } else {
            throw new Error("Invalid Credentials");
          }

        } else if (currentRole === 'buyer') {
          
          if (buyerMode === 'register') {
            // --- REGISTER BUYER (Email Based) ---
            const email = document.getElementById('buyer-reg-email').value.trim();
            const username = document.getElementById('buyer-reg-name').value.trim();
            const pass = document.getElementById('buyer-reg-pass').value.trim();
            
            if(username.length < 3) { throw new Error("Username minimal 3 karakter"); }
            
            // Cek apakah email sudah ada (Gunakan Email sebagai Document ID)
            const docRef = doc(db, "users", email);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
              throw new Error("Email sudah terdaftar!");
            } else {
              await setDoc(docRef, { email, username, password: pass, role: 'buyer', createdAt: new Date() });
              showToast("Registrasi Berhasil! Silakan Login.", "success");
              toggleBuyerMode('login');
            }

          } else {
            // --- LOGIN BUYER (Email Based) ---
            const email = document.getElementById('buyer-login-email').value.trim();
            const pass = document.getElementById('buyer-login-pass').value.trim();

            const docRef = doc(db, "users", email);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
              const data = docSnap.data();
              if (data.password === pass) {
                showToast(`WELCOME, ${data.username}`, "success");
                // Redirect ke index.html
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
              } else {
                throw new Error("PASSWORD SALAH!");
              }
            } else {
              throw new Error("Email tidak terdaftar.");
            }
          }
        }
      } catch (err) {
        console.error(err);
        showToast(err.message || "Terjadi kesalahan sistem", "error");
        resetBtn(originalText);
      }
    }

    // --- UI UPDATE LOGIC ---
    function updateUI() {
      // Role Buttons
      const btnAdmin = document.getElementById('btn-admin');
      const btnBuyer = document.getElementById('btn-buyer');
      
      // Hapus event lama untuk mencegah double bind (best practice)
      btnAdmin.replaceWith(btnAdmin.cloneNode(true));
      btnBuyer.replaceWith(btnBuyer.cloneNode(true));
      
      // Re-bind event listeners secara manual agar lebih stabil
      document.getElementById('btn-admin').addEventListener('click', () => window.switchRole('admin'));
      document.getElementById('btn-buyer').addEventListener('click', () => window.switchRole('buyer'));

      // Set Active Class
      document.getElementById('btn-admin').className = currentRole === 'admin' ? 'role-btn active' : 'role-btn';
      document.getElementById('btn-buyer').className = currentRole === 'buyer' ? 'role-btn active' : 'role-btn';

      // Hide Forms
      document.getElementById('form-admin').classList.remove('active');
      document.getElementById('form-buyer-login').classList.remove('active');
      document.getElementById('form-buyer-register').classList.remove('active');

      // Show Correct Form
      const btnText = document.getElementById('btn-text');
      
      if (currentRole === 'admin') {
        document.getElementById('form-admin').classList.add('active');
        btnText.innerText = "AUTHENTICATE ADMIN";
      } else if (currentRole === 'buyer') {
        if (buyerMode === 'login') {
          document.getElementById('form-buyer-login').classList.add('active');
          btnText.innerText = "BUYER LOGIN";
        } else {
          document.getElementById('form-buyer-register').classList.add('active');
          btnText.innerText = "REGISTER NEW BUYER";
        }
      }
      
      // Clear Inputs
      document.querySelectorAll('.input-field').forEach(i => i.value = '');
    }

    function resetBtn(originalText) {
      isProcessing = false;
      document.getElementById('btn-text').innerText = originalText;
      document.getElementById('btn-icon').className = "fas fa-sign-in-alt";
      document.getElementById('submit-btn').disabled = false;
    }

    // --- INIT ---
    // Event Listeners khusus untuk link toggle di dalam form
    document.getElementById('link-to-register').addEventListener('click', () => window.toggleBuyerMode('register'));
    document.getElementById('link-to-login').addEventListener('click', () => window.toggleBuyerMode('login'));

    // Bind Form Submit
    document.getElementById('authForm').addEventListener('submit', window.handleAuth);

    // Set UI Awal
    updateUI();
  </script>

  <!-- PARTICLES (Fixed) -->
  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let pArr = [];
    
    function resizeCanvas() { 
      canvas.width = window.innerWidth; 
      canvas.height = window.innerHeight; 
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    for (let i = 0; i < 50; i++) {
      pArr.push({ 
        x: Math.random() * canvas.width, 
        y: Math.random() * canvas.height, 
        size: Math.random() * 1.5 + 0.5, 
        speedX: (Math.random() - 0.5) * 0.5, 
        speedY: (Math.random() - 0.5) * 0.5, 
        opacity: Math.random() * 0.5 + 0.1 
      });
    }

    function animP() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pArr.forEach(p => {
        p.x += p.speedX; p.y += p.speedY;
        if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,232,157,${p.opacity})`; ctx.fill();
      });
      for (let i = 0; i < pArr.length; i++) {
        for (let j = i + 1; j < pArr.length; j++) {
          const dx = pArr[i].x - pArr[j].x, dy = pArr[i].y - pArr[j].y, d = Math.sqrt(dx * dx + dy * dy);
          if (d < 120) {
            ctx.beginPath(); ctx.moveTo(pArr[i].x, pArr[i].y); ctx.lineTo(pArr[j].x, pArr[j].y);
            ctx.strokeStyle = `rgba(0,232,157,${0.05 * (1 - d / 120)})`; ctx.lineWidth = 0.5; ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animP);
    }
    animP();
  </script>
</body>
</html>
