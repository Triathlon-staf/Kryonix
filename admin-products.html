<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADMIN | MANAJEMEN PRODUK</title>
  <link rel="icon" type="image/png" href="images/icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Space Grotesk', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: { dark: { bg: '#060a10', card: '#0c1220', border: '#152035' }, accent: { green: '#00e89d', cyan: '#00c4ff', red: '#ff4757' } }
        }
      }
    }
  </script>

  <style>
    body { background: #060a10; color: #e8ecf2; font-family: 'Space Grotesk'; min-height: 100vh; padding: 2rem; }
    .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,232,157,0.03) 1px, transparent 1px), linear-gradient(90deg,rgba(0,232,157,0.03) 1px, transparent 1px); background-size: 40px 40px; z-index: 0; pointer-events: none; }
    .glass-panel { background: rgba(12, 18, 32, 0.8); border: 1px solid #152035; border-radius: 16px; padding: 2rem; backdrop-filter: blur(10px); }
    .btn-action { transition: 0.2s; }
    .btn-action:hover { transform: scale(1.1); }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="relative z-10 max-w-7xl mx-auto">
    
    <!-- HEADER -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-bold text-white"><i class="fas fa-boxes text-green-400 mr-3"></i> MANAJEMEN PRODUK</h1>
        <p class="text-gray-500 font-mono text-sm mt-1">KRYONIX STORE CONTROL PANEL</p>
      </div>
      <a href="admin.html" class="px-4 py-2 border border-dark-border rounded hover:bg-dark-card text-gray-400 hover:text-white transition">
        <i class="fas fa-arrow-left mr-2"></i> Dashboard Utama
      </a>
    </div>

    <!-- ADD PRODUCT FORM -->
    <div class="glass-panel mb-8">
      <h2 class="text-xl font-bold mb-4 text-cyan-400 border-b border-dark-border pb-2">Tambah / Update Produk</h2>
      <form id="productForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <input type="hidden" id="productId">
        
        <div>
          <label class="block text-gray-400 text-sm mb-1">Nama Produk</label>
          <input type="text" id="title" class="w-full bg-dark-bg border border-dark-border rounded p-2 text-white focus:border-green-400 outline-none" placeholder="Misal: VPS Premium" required>
        </div>
        
        <div>
          <label class="block text-gray-400 text-sm mb-1">Harga (Rp)</label>
          <input type="number" id="price" class="w-full bg-dark-bg border border-dark-border rounded p-2 text-white focus:border-green-400 outline-none" placeholder="50000" required>
        </div>

        <div>
          <label class="block text-gray-400 text-sm mb-1">Kategori</label>
          <select id="category" class="w-full bg-dark-bg border border-dark-border rounded p-2 text-white focus:border-green-400 outline-none">
            <option value="hosting">Hosting</option>
            <option value="vps">VPS</option>
            <option value="domain">Domain</option>
            <option value="addon">Addon</option>
          </select>
        </div>

        <div>
          <label class="block text-gray-400 text-sm mb-1">URL Gambar (Direct Link)</label>
          <input type="url" id="image" class="w-full bg-dark-bg border border-dark-border rounded p-2 text-white focus:border-green-400 outline-none" placeholder="https://i.imgur.com/..." required>
        </div>

        <div class="md:col-span-2">
          <label class="block text-gray-400 text-sm mb-1">Deskripsi Singkat</label>
          <textarea id="description" class="w-full bg-dark-bg border border-dark-border rounded p-2 text-white focus:border-green-400 outline-none h-20" placeholder="Deskripsi produk..."></textarea>
        </div>

        <div class="md:col-span-2">
          <label class="block text-gray-400 text-sm mb-1">Fitur (Pisahkan dengan koma)</label>
          <input type="text" id="features" class="w-full bg-dark-bg border border-dark-border rounded p-2 text-white focus:border-green-400 outline-none" placeholder="SSD NVMe, Unlimited Bandwidth, Free SSL">
        </div>

        <div class="md:col-span-2 flex justify-end gap-3">
          <button type="button" onclick="resetForm()" class="px-6 py-2 rounded text-gray-400 hover:text-white">Reset</button>
          <button type="submit" class="bg-green-500 hover:bg-green-400 text-black font-bold px-6 py-2 rounded shadow-[0_0_15px_rgba(0,232,157,0.4)]">
            <i class="fas fa-save mr-2"></i> SIMPAN PRODUK
          </button>
        </div>
      </form>
    </div>

    <!-- PRODUCT LIST -->
    <div class="glass-panel overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr class="border-b border-dark-border text-gray-500 font-mono text-sm">
            <th class="p-4">GAMBAR</th>
            <th class="p-4">PRODUK</th>
            <th class="p-4">KATEGORI</th>
            <th class="p-4">HARGA</th>
            <th class="p-4 text-center">AKSI</th>
          </tr>
        </thead>
        <tbody id="productList">
          <tr><td colspan="5" class="p-8 text-center text-gray-500">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <!-- SCRIPTS -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBHPvQ6Bt9f6U3wqDz3CG71HNpcFq3RZRI",
      authDomain: "kryonix-7c55e.firebaseapp.com",
      projectId: "kryonix-7c55e",
      storageBucket: "kryonix-7c55e.firebasestorage.app",
      messagingSenderId: "917095112473",
      appId: "1:917095112473:web:dd4120a14724e6e6a02f88",
      measurementId: "G-9Y77T2V6H7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('productForm');
    const list = document.getElementById('productList');

    // LOAD PRODUCTS
    async function loadProducts() {
      const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
      const querySnapshot = await getDocs(q);
      
      list.innerHTML = '';
      if(querySnapshot.empty) {
        list.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-gray-500">Belum ada produk. Silakan tambah baru.</td></tr>';
        return;
      }

      querySnapshot.forEach((docSnap) => {
        const p = docSnap.data();
        const id = docSnap.id;
        const row = document.createElement('tr');
        row.className = 'border-b border-dark-border hover:bg-white/5 transition';
        row.innerHTML = `
          <td class="p-4"><img src="${p.image}" class="w-12 h-12 object-cover rounded border border-dark-border"></td>
          <td class="p-4">
            <div class="font-bold text-white">${p.title}</div>
            <div class="text-xs text-gray-500 truncate max-w-[200px]">${p.description}</div>
          </td>
          <td class="p-4"><span class="px-2 py-1 rounded bg-dark-card border border-dark-border text-xs text-cyan-400 uppercase">${p.category}</span></td>
          <td class="p-4 font-mono text-green-400">Rp ${parseInt(p.price).toLocaleString('id-ID')}</td>
          <td class="p-4 text-center">
            <button onclick="window.editProduct('${id}')" class="text-cyan-400 hover:text-cyan-300 btn-action mx-2"><i class="fas fa-edit"></i></button>
            <button onclick="window.deleteProduct('${id}')" class="text-red-500 hover:text-red-400 btn-action mx-2"><i class="fas fa-trash"></i></button>
          </td>
        `;
        list.appendChild(row);
      });
    }

    // ADD / UPDATE
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('productId').value;
      const data = {
        title: document.getElementById('title').value,
        price: Number(document.getElementById('price').value),
        category: document.getElementById('category').value,
        image: document.getElementById('image').value,
        description: document.getElementById('description').value,
        features: document.getElementById('features').value.split(',').map(s => s.trim()),
        updatedAt: new Date()
      };

      if (id) {
        // Update
        await updateDoc(doc(db, "products", id), data);
        alert('Produk berhasil diupdate!');
      } else {
        // Add
        data.createdAt = new Date();
        await addDoc(collection(db, "products"), data);
        alert('Produk berhasil ditambahkan!');
      }
      
      resetForm();
      loadProducts();
    });

    // EDIT FUNCTION
    window.editProduct = async (id) => {
      const snap = await getDocs(collection(db, "products"));
      const docSnap = snap.docs.find(d => d.id === id);
      if(docSnap) {
        const p = docSnap.data();
        document.getElementById('productId').value = id;
        document.getElementById('title').value = p.title;
        document.getElementById('price').value = p.price;
        document.getElementById('category').value = p.category;
        document.getElementById('image').value = p.image;
        document.getElementById('description').value = p.description;
        document.getElementById('features').value = p.features.join(', ');
        document.querySelector('button[type="submit"]').innerHTML = '<i class="fas fa-sync mr-2"></i> UPDATE PRODUK';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    };

    // DELETE FUNCTION
    window.deleteProduct = async (id) => {
      if(confirm('Yakin ingin menghapus produk ini?')) {
        await deleteDoc(doc(db, "products", id));
        loadProducts();
      }
    };

    window.resetForm = () => {
      form.reset();
      document.getElementById('productId').value = '';
      document.querySelector('button[type="submit"]').innerHTML = '<i class="fas fa-save mr-2"></i> SIMPAN PRODUK';
    };

    loadProducts();
  </script>
</body>
</html>
