<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REGISTER | KRYONIX</title>
  <link rel="icon" type="image/png" href="images/icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { sans: ['Space Grotesk', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
        colors: {
          dark: { bg: '#060a10', card: '#0c1220', border: '#152035' },
          accent: { green: '#00e89d', cyan: '#00c4ff', purple: '#a78bfa' }
        }
      }}
    }
  </script>

  <style>
    :root {
      --bg: #060a10; --bg-card: #0c1220; --fg: #e8ecf2; --muted: #5a6a80;
      --green: #00e89d; --cyan: #00c4ff; --purple: #a78bfa; --border: #152035;
    }
    body {
      background: var(--bg); color: var(--fg); font-family: 'Space Grotesk', sans-serif;
      overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center;
    }

    .grid-bg {
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(167,139,250,0.025) 1px, transparent 1px),
                        linear-gradient(90deg,rgba(167,139,250,0.025) 1px, transparent 1px);
      background-size: 50px 50px; z-index: 0; pointer-events: none;
    }
    .scanline {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
    }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
      animation: orbFloat 10s ease-in-out infinite alternate;
    }
    .orb-1 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(167,139,250,0.07), transparent 70%); top: -80px; right: -80px; }
    .orb-2 { width: 250px; height: 250px; background: radial-gradient(circle, rgba(0,196,255,0.05), transparent 70%); bottom: -60px; left: -60px; animation-delay: -5s; }
    @keyframes orbFloat { 0% { transform: translate(0,0); } 100% { transform: translate(20px, 30px); } }

    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .login-card {
      position: relative; z-index: 10; width: 100%; max-width: 420px; margin: 1rem;
      background: rgba(12, 18, 32, 0.75); backdrop-filter: blur(24px);
      border: 1px solid var(--border); border-radius: 20px;
      box-shadow: 0 0 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(167,139,250,0.03);
      animation: cardIn 0.6s ease;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-glow {
      position: absolute; top: -1px; left: 20%; right: 20%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(167,139,250,0.4), transparent);
    }

    .logo-img {
      width: 56px; height: 56px; object-fit: cover; border-radius: 14px;
      box-shadow: 0 0 20px rgba(167,139,250,0.15);
    }

    .input-wrap {
      position: relative; margin-bottom: 1.25rem;
    }
    .input-wrap i.field-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 0.85rem; transition: color 0.3s; pointer-events: none; z-index: 2;
    }
    .input-field {
      width: 100%; background: #080c14; border: 1px solid var(--border);
      padding: 14px 16px 14px 44px; border-radius: 12px; color: white;
      outline: none; font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem;
      transition: all 0.3s;
    }
    .input-field::placeholder { color: #3a4a5e; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; letter-spacing: 0.5px; }
    .input-field:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.08);
    }
    .input-wrap:focus-within i.field-icon { color: var(--purple); }

    /* Password toggle */
    .pass-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 0.85rem; cursor: pointer;
      transition: color 0.3s; background: none; border: none; padding: 4px; z-index: 2;
    }
    .pass-toggle:hover { color: var(--purple); }

    /* Password strength */
    .strength-bar {
      display: flex; gap: 4px; margin-top: -8px; margin-bottom: 14px; padding: 0 4px;
    }
    .strength-seg {
      flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background 0.3s;
    }
    .strength-label {
      font-size: 0.65rem; font-family: 'JetBrains Mono', monospace;
      margin-top: -10px; margin-bottom: 12px; padding: 0 4px; transition: color 0.3s;
      color: transparent;
    }

    .btn-login {
      width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 0.95rem;
      background: linear-gradient(135deg, var(--purple), #7c3aed); color: white;
      border: none; cursor: pointer; transition: all 0.3s; font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.5px; position: relative; overflow: hidden;
    }
    .btn-login:hover { box-shadow: 0 0 25px rgba(167,139,250,0.4); transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-login.loading { pointer-events: none; }

    .status-line {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 10px;
      background: rgba(167,139,250,0.04); border: 1px solid rgba(167,139,250,0.08);
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
      color: rgba(167,139,250,0.6);
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .divider {
      display: flex; align-items: center; gap: 12px; margin: 1.5rem 0;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 0.7rem; color: #3a4a5e; font-family: 'JetBrains Mono', monospace; }

    .back-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      color: var(--muted); font-size: 0.85rem; text-decoration: none; transition: 0.3s;
      padding: 8px; border-radius: 8px;
    }
    .back-link:hover { color: var(--purple); background: rgba(167,139,250,0.04); }
    .back-link i { font-size: 0.7rem; transition: transform 0.3s; }
    .back-link:hover i { transform: translateX(-3px); }
    .back-link.login-link:hover { color: var(--green); background: rgba(0,232,157,0.04); }

    /* Toast */
    .toast-container {
      position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .toast {
      padding: 14px 20px; border-radius: 12px; font-size: 0.875rem;
      backdrop-filter: blur(16px); border: 1px solid;
      animation: toastIn 0.3s ease;
      display: flex; align-items: center; gap: 10px;
      max-width: 380px; font-family: 'Space Grotesk', sans-serif;
    }
    .toast.error { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: #fca5a5; }
    .toast.success { background: rgba(167,139,250,0.1); border-color: rgba(167,139,250,0.2); color: #c4b5fd; }
    .toast.fadeout { animation: toastOut 0.3s ease forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(30px); } }

    /* Error state on input */
    .input-wrap.error .input-field { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.08); }
    .input-wrap.error i.field-icon { color: #ef4444; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <canvas id="particles"></canvas>
  <div class="scanline"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <div class="login-card" id="loginCard">
    <div class="card-glow"></div>

    <div class="p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center mb-5">
          <img src="https://i.pinimg.com/736x/89/75/5d/89755dd7321afe2c3295a39df24e8309.jpg" alt="KRYONIX" class="logo-img">
        </div>
        <h1 class="text-2xl font-bold tracking-tight">CREATE ACCOUNT</h1>
        <p class="text-xs font-mono mt-2" style="color:var(--muted);">KRYONIX CUSTOMER PORTAL // NEW REGISTRATION</p>
      </div>

      <!-- Status -->
      <div class="status-line mb-6">
        <span class="status-dot"></span>
        SECURE CHANNEL &mdash; DATA ENCRYPTED END-TO-END
      </div>

      <!-- Form -->
      <form onsubmit="handleRegister(event)" id="registerForm" novalidate>
        <div class="input-wrap" id="usernameWrap">
          <input type="text" id="username" class="input-field" placeholder="DISPLAY NAME" required autocomplete="off" minlength="2" maxlength="20">
          <i class="fas fa-user field-icon"></i>
        </div>

        <div class="input-wrap" id="emailWrap">
          <input type="email" id="email" class="input-field" placeholder="EMAIL ADDRESS" required autocomplete="email">
          <i class="fas fa-envelope field-icon"></i>
        </div>

        <div class="input-wrap" id="passWrap">
          <input type="password" id="pass" class="input-field" placeholder="PASSWORD" required minlength="6" style="padding-right:44px;">
          <i class="fas fa-lock field-icon"></i>
          <button type="button" class="pass-toggle" id="passToggle" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
        </div>

        <!-- Password strength -->
        <div class="strength-bar" id="strengthBar">
          <div class="strength-seg" id="seg1"></div>
          <div class="strength-seg" id="seg2"></div>
          <div class="strength-seg" id="seg3"></div>
          <div class="strength-seg" id="seg4"></div>
        </div>
        <div class="strength-label" id="strengthLabel"></div>

        <div class="input-wrap" id="pass2Wrap">
          <input type="password" id="pass2" class="input-field" placeholder="CONFIRM PASSWORD" required minlength="6">
          <i class="fas fa-lock field-icon"></i>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <i class="fas fa-user-plus mr-2 text-sm"></i>CREATE ACCOUNT
        </button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span>OPTIONS</span>
      </div>

      <!-- Bottom links -->
      <div class="space-y-1">
        <a href="login-buyer.html" class="back-link login-link">
          <i class="fas fa-sign-in-alt"></i>
          Already have an account? Login
        <a href="index.html" class="back-link">
          <i class="fas fa-arrow-left"></i>
          Back to Home
        </a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBHPvQ6Bt9f6U3wqDz3CG71HNpcFq3RZRI",
      authDomain: "kryonix-7c55e.firebaseapp.com",
      databaseURL: "https://kryonix-7c55e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kryonix-7c55e",
      storageBucket: "kryonix-7c55e.firebasestorage.app",
      messagingSenderId: "917095112473",
      appId: "1:917095112473:web:dd4120a14724e6e6a02f88",
      measurementId: "G-9Y77T2V6H7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ═══ TOAST ═══
    function showToast(message, type = 'error') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
      toast.innerHTML = `<i class="fas ${icon}"></i><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('fadeout');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    // ═══ PASSWORD TOGGLE ═══
    document.getElementById('passToggle').addEventListener('click', () => {
      const passField = document.getElementById('pass');
      const icon = document.querySelector('#passToggle i');
      if (passField.type === 'password') {
        passField.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        passField.type = 'password';
        icon.className = 'fas fa-eye';
      }
    });

    // ═══ PASSWORD STRENGTH ═══
    const passField = document.getElementById('pass');
    const segs = [document.getElementById('seg1'), document.getElementById('seg2'), document.getElementById('seg3'), document.getElementById('seg4')];
    const strengthLabel = document.getElementById('strengthLabel');

    const strengthLevels = [
      { color: '#ef4444', label: 'Weak' },
      { color: '#f97316', label: 'Fair' },
      { color: '#eab308', label: 'Good' },
      { color: '#22c55e', label: 'Strong' }
    ];

    passField.addEventListener('input', () => {
      const val = passField.value;
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
      if (/[^a-zA-Z0-9]/.test(val)) score++;

      segs.forEach((seg, i) => {
        seg.style.background = i < score ? strengthLevels[Math.min(score - 1, 3)].color : 'var(--border)';
      });

      if (val.length === 0) {
        strengthLabel.style.color = 'transparent';
        strengthLabel.textContent = '';
      } else {
        strengthLabel.style.color = strengthLevels[Math.min(score - 1, 3)].color;
        strengthLabel.textContent = strengthLevels[Math.min(score - 1, 3)].label.toUpperCase();
      }
    });

    // ═══ CLEAR ERROR ON INPUT ═══
    ['username', 'email', 'pass', 'pass2'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById(id + 'Wrap').classList.remove('error');
      });
    });

    // ═══ REGISTER ═══
    window.handleRegister = async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('pass').value;
      const pass2 = document.getElementById('pass2').value;
      const btn = document.getElementById('loginBtn');

      // Validation
      let hasError = false;

      if (username.length < 2) {
        document.getElementById('usernameWrap').classList.add('error');
        showToast('Display name minimal 2 karakter.'); hasError = true;
      }
      if (username.length > 20) {
        document.getElementById('usernameWrap').classList.add('error');
        showToast('Display name maksimal 20 karakter.'); hasError = true;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailWrap').classList.add('error');
        showToast('Format email tidak valid.'); hasError = true;
      }
      if (pass.length < 6) {
        document.getElementById('passWrap').classList.add('error');
        showToast('Password minimal 6 karakter.'); hasError = true;
      }
      if (pass !== pass2) {
        document.getElementById('pass2Wrap').classList.add('error');
        showToast('Password dan konfirmasi tidak cocok.'); hasError = true;
      }
      if (hasError) return;

      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2 text-sm"></i>CREATING ACCOUNT...';
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);

        // Update Firebase Auth display name
        await updateProfile(userCredential.user, { displayName: username });

        // Simpan nama ke Realtime Database
        await set(ref(db, `users/${userCredential.user.uid}/name`), username);
        await set(ref(db, `users/${userCredential.user.uid}/email`), email);
        await set(ref(db, `users/${userCredential.user.uid}/createdAt`), Date.now());

        btn.innerHTML = '<i class="fas fa-check-circle mr-2 text-sm"></i>ACCOUNT CREATED';
        showToast('Registrasi berhasil! Mengalihkan ke login...', 'success');

        setTimeout(() => {
          // Sign out agar user login ulang (clean session)
          auth.signOut();
          window.location.href = 'login-buyer.html';
        }, 1500);

      } catch (error) {
        console.error(error);
        if (error.code === 'auth/email-already-in-use') {
          document.getElementById('emailWrap').classList.add('error');
          showToast('Email sudah terdaftar. Silakan login.');
        } else if (error.code === 'auth/weak-password') {
          document.getElementById('passWrap').classList.add('error');
          showToast('Password terlalu lemah. Minimal 6 karakter.');
        } else if (error.code === 'auth/invalid-email') {
          document.getElementById('emailWrap').classList.add('error');
          showToast('Format email tidak valid.');
        } else if (error.code === 'auth/too-many-requests') {
          showToast('Terlalu banyak percobaan. Coba lagi nanti.');
        } else {
          showToast('Error: ' + error.message);
        }
        btn.innerHTML = '<i class="fas fa-user-plus mr-2 text-sm"></i>CREATE ACCOUNT';
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }
  </script>

  <script>
    // ═══ PARTICLES ═══
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let pArr = [];
    function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
    addEventListener('resize', resizeCanvas); resizeCanvas();
    for (let i = 0; i < 40; i++) pArr.push({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      size: Math.random() * 1.5 + 0.5, speedX: (Math.random() - 0.5) * 0.4,
      speedY: (Math.random() - 0.5) * 0.4, opacity: Math.random() * 0.5 + 0.1
    });
    function animP() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pArr.forEach(p => {
        p.x += p.speedX; p.y += p.speedY;
        if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(167,139,250,${p.opacity})`; ctx.fill();
      });
      for (let i = 0; i < pArr.length; i++) {
        for (let j = i + 1; j < pArr.length; j++) {
          const dx = pArr[i].x - pArr[j].x, dy = pArr[i].y - pArr[j].y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 100) {
            ctx.beginPath(); ctx.moveTo(pArr[i].x, pArr[i].y); ctx.lineTo(pArr[j].x, pArr[j].y);
            ctx.strokeStyle = `rgba(167,139,250,${0.04 * (1 - d / 100)})`;
            ctx.lineWidth = 0.5; ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animP);
    }
    animP();

    // ═══ INPUT FOCUS CARD GLOW ═══
    const inputs = document.querySelectorAll('.input-field');
    const card = document.getElementById('loginCard');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        card.style.borderColor = 'rgba(167,139,250,0.2)';
        card.style.boxShadow = '0 0 60px rgba(0,0,0,0.5), 0 0 30px rgba(167,139,250,0.06)';
      });
      input.addEventListener('blur', () => {
        card.style.borderColor = 'var(--border)';
        card.style.boxShadow = '0 0 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(167,139,250,0.03)';
      });
    });
  </script>
</body>
</html>
